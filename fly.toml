# fly.toml app configuration file generated for mrp-api-odgwba on 2026-02-12T22:21:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mrp-api-odgwba'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
